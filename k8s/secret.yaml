apiVersion: v1
kind: Secret
metadata:
  name: notes-secrets
type: Opaque
# stringData accepts plain text — Kubernetes base64-encodes it automatically.

stringData:
  DATABASE_URL: "postgresql://user:password@host:5432/database" # Update with actual database connection string
  JWT_SECRET: "change_me_to_a_random_secret"  # Update with a secure random string for JWT signing
